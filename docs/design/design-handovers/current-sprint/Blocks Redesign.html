<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sage.AI — Blocks (Responsive)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="mantine.css" />
  <link rel="stylesheet" href="mobile.css" />
  <style>
    html, body { height: 100%; }
    body { background: var(--mantine-color-gray-1); }
    #root { min-height: 100vh; }

    /* ===== Preview chrome (when a breakpoint is forced) =====
       The page shows a neutral canvas with a centered device-sized box; the app renders inside that box.
       When 'real' is selected, no chrome is shown — the app fills the viewport normally. */
    .rp-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .rp-root[data-mode="real"] { background: var(--mantine-color-body); }
    .rp-root[data-mode="real"] .rp-stage { flex: 1; display: block; }
    .rp-root[data-mode="real"] .rp-frame { width: 100%; max-width: none; box-shadow: none; border-radius: 0; overflow: visible; }
    .rp-root[data-mode="real"] .rp-meta { display: none; }

    .rp-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 96px;
      gap: 16px;
    }
    .rp-meta {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dimmed);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .rp-meta strong { color: var(--text); letter-spacing: 0.05em; font-weight: 600; }

    .rp-frame {
      background: var(--mantine-color-body);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12), 0 2px 6px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(15, 23, 42, 0.06);
      width: 100%;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
    }
    .rp-frame[data-bp="mobile"] {
      width: 390px;
      height: 780px;
      max-height: calc(100vh - 140px);
      border-radius: 36px;
    }
    .rp-frame[data-bp="tablet"] {
      width: 820px;
      height: 1060px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 140px);
      border-radius: 22px;
    }
    .rp-frame[data-bp="desktop"] {
      width: min(1440px, calc(100vw - 40px));
      height: calc(100vh - 140px);
      border-radius: 16px;
    }

    /* The app itself must fill the frame box */
    .rp-frame > .rp-inner {
      flex: 1;
      display: flex;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      position: relative;
    }

    /* When mounted inside the frame, the app-shell should behave like a contained viewport */
    .rp-frame .app-shell { min-height: 100%; height: 100%; width: 100%; flex: 1; }
    .rp-frame .app-shell__main { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; }
    .rp-frame .mobile-shell { height: 100%; max-width: none; }

    /* Hide desktop sidebar on tablet + mobile frames */
    .rp-frame[data-bp="mobile"] .app-shell__sidebar,
    .rp-frame[data-bp="tablet"] .app-shell__sidebar { display: none; }

    /* ===== Frame-scoped overrides (apply when a preview frame forces a breakpoint) ===== */

    /* When the sidebar is hidden inside a preview frame, reclaim the 240px grid track */
    .rp-frame[data-bp="mobile"] .app-shell,
    .rp-frame[data-bp="tablet"] .app-shell { grid-template-columns: 1fr; }

    /* Header wrap + padding */
    .rp-frame[data-bp="tablet"] .page-header,
    .rp-frame[data-bp="mobile"] .page-header {
      flex-wrap: nowrap;
      gap: 12px;
      padding: 14px 16px;
      align-items: center;
    }
    .rp-frame[data-bp="tablet"] .page-header__title,
    .rp-frame[data-bp="mobile"] .page-header__title { font-size: 18px; }
    .rp-frame[data-bp="tablet"] .page-header__subtitle,
    .rp-frame[data-bp="mobile"] .page-header__subtitle { display: none; }

    /* Variation A table: horizontal scroll in narrow frames if needed */
    .rp-frame[data-bp="tablet"] .paper { overflow-x: auto !important; }
    .rp-frame[data-bp="mobile"] .paper { overflow-x: auto !important; }

    /* Modal inside narrow frames */
    .rp-frame[data-bp="tablet"] .modal,
    .rp-frame[data-bp="mobile"] .modal {
      width: calc(100% - 24px) !important;
      max-width: none !important;
    }

    /* ===== Real-viewport responsive behavior (applies when NOT forced into a frame,
         i.e. mode = 'real' and the page is letting the browser pick) ===== */

    /* Tablet: 641 – 1023px */
    @media (max-width: 1023px) {
      .app-shell { grid-template-columns: 1fr !important; }
      .app-shell__sidebar { display: none !important; }
      .page-header {
        flex-wrap: nowrap;
        gap: 12px;
        padding: 14px 16px;
        align-items: center;
      }
      .page-header__title { font-size: 18px; }
      .page-header__subtitle { display: none; }
      .text-input { min-width: 0; }
      .modal {
        width: calc(100vw - 24px) !important;
        max-width: none !important;
        max-height: calc(100vh - 24px);
      }
    }

    /* ===== Tablet drawer (hamburger → slide-in sidebar) ===== */
    .app-shell { position: relative; }
    .page-header__menu {
      display: none; /* only shown when rendered inside a tablet/mobile frame */
      margin-right: 12px;
      flex: 0 0 auto;
    }
    .rp-frame[data-bp="tablet"] .page-header__menu,
    .rp-frame[data-bp="mobile"] .page-header__menu { display: inline-flex; }
    @media (max-width: 1023px) {
      .page-header__menu { display: inline-flex; }
    }

    .tablet-drawer__scrim {
      position: absolute; inset: 0;
      background: rgba(15, 23, 42, 0.42);
      z-index: 50; animation: tdFade 160ms ease-out;
    }
    .tablet-drawer {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 280px; max-width: 85%;
      background: var(--mantine-color-dark-9);
      z-index: 51;
      box-shadow: 2px 0 24px rgba(15, 23, 42, 0.28);
      animation: tdSlide 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
      overflow-y: auto;
    }
    .tablet-drawer .app-shell__nav {
      height: 100%; border-radius: 0; border-right: none;
      display: flex; flex-direction: column;
    }
    .tablet-drawer__close {
      position: absolute; top: 12px; right: 12px;
      width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: #fff;
      cursor: pointer; z-index: 2;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }
    .tablet-drawer__close:hover { background: rgba(255,255,255,0.20); border-color: rgba(255,255,255,0.32); }
    .tablet-drawer__close:focus-visible { outline: 2px solid var(--mantine-color-blue-4); outline-offset: 2px; }
    @keyframes tdFade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tdSlide { from { transform: translateX(-100%); } to { transform: translateX(0); } }

    /* ===== Breakpoint switcher (top-centered pill) ===== */
    .bp-switcher {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--mantine-color-dark-8);
      color: var(--mantine-color-white);
      border-radius: 999px;
      padding: 4px;
      display: flex;
      gap: 2px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.22);
      z-index: 60;
      font-family: var(--mantine-font-family);
    }
    .bp-switcher button {
      background: transparent; color: var(--mantine-color-dark-1);
      border: none; padding: 7px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    }
    .bp-switcher button:hover { color: white; }
    .bp-switcher button.is-active { background: var(--mantine-color-blue-6); color: white; }
    .bp-switcher .bp-sep { width: 1px; background: rgba(255,255,255,0.12); margin: 4px 2px; }
    .bp-switcher .bp-label {
      color: var(--mantine-color-dark-2); font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0 10px; display: inline-flex; align-items: center;
    }

    /* When in 'real' mode, hide the switcher's width readout line */
    .rp-root[data-mode="real"] .rp-stage { padding: 0; }

    /* ===== Tweaks panel (unchanged from before) ===== */
    .tweaks-panel {
      position: fixed; bottom: 16px; right: 16px;
      width: 280px; z-index: 70;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--mantine-radius-md);
      box-shadow: var(--mantine-shadow-md);
      font-family: var(--mantine-font-family);
    }
    .tweaks-panel__header {
      padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .tweaks-panel__title { font-size: 13px; font-weight: 600; }
    .tweaks-panel__body { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
    .tweak-row { display: flex; flex-direction: column; gap: 6px; }
    .tweak-row__label { font-size: 11px; color: var(--text-dimmed); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .tweak-row__control { display: flex; gap: 4px; flex-wrap: wrap; }
    .tweak-row__control button {
      flex: 1; min-width: 0;
      padding: 6px 8px; border-radius: 4px; border: 1px solid var(--border-strong);
      background: var(--surface); color: var(--text-muted);
      font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .tweak-row__control button.is-active {
      background: var(--primary-light); color: var(--primary);
      border-color: var(--primary);
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="dnd.jsx"></script>
  <script type="text/babel" src="variation-a.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>
  <script type="text/babel" src="mobile-compile.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mode": "desktop",
      "scheme": "light"
    }/*EDITMODE-END*/;

    const { useState, useEffect, useMemo } = React;

    // Breakpoint logic — when mode === 'real' we follow the actual viewport; otherwise we use the forced mode.
    function resolveBreakpoint(mode, realWidth) {
      if (mode === "mobile") return "mobile";
      if (mode === "tablet") return "tablet";
      if (mode === "desktop") return "desktop";
      if (realWidth <= 640) return "mobile";
      if (realWidth <= 1023) return "tablet";
      return "desktop";
    }

    function useRealViewportWidth() {
      const [w, setW] = useState(() => (typeof window !== "undefined" ? window.innerWidth : 1440));
      useEffect(() => {
        const onResize = () => setW(window.innerWidth);
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);
      return w;
    }

    // ==== Tablet layout: Variation A (enhanced table) with tablet-adjusted columns + left-drawer nav ====
    function TabletLayout({ onCompile }) {
      const [drawerOpen, setDrawerOpen] = useState(false);
      useEffect(() => {
        if (!drawerOpen) return;
        const onKey = (e) => { if (e.key === "Escape") setDrawerOpen(false); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [drawerOpen]);
      return (
        <div className="app-shell">
          <main className="app-shell__main">
            <VariationA onCompile={onCompile} density="tablet" onMenu={() => setDrawerOpen(true)} />
          </main>
          {drawerOpen && (
            <>
              <div className="tablet-drawer__scrim" onClick={() => setDrawerOpen(false)} />
              <aside className="tablet-drawer" role="dialog" aria-label="Navigation">
                <button
                  className="tablet-drawer__close"
                  onClick={() => setDrawerOpen(false)}
                  aria-label="Close navigation"
                  title="Close (Esc)"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
                </button>
                <Sidebar />
              </aside>
            </>
          )}
        </div>
      );
    }

    // ==== Desktop layout: Variation A (the chosen direction) with sidebar ====
    function DesktopLayout({ onCompile }) {
      return (
        <div className="app-shell">
          <Sidebar />
          <main className="app-shell__main">
            <VariationA onCompile={onCompile} />
          </main>
        </div>
      );
    }

    // ==== Mobile layout: live MobileBlocks (not the scene grid) ====
    function MobileLayout({ onCompile }) {
      return <MobileBlocks onCompile={onCompile} />;
    }

    function App() {
      const [mode, setMode] = useState(() => localStorage.getItem("blocks_rp_mode") || TWEAK_DEFAULTS.mode);
      const [scheme, setScheme] = useState(() => localStorage.getItem("blocks_rp_scheme") || TWEAK_DEFAULTS.scheme);
      const [editMode, setEditMode] = useState(false);
      const [showCompile, setShowCompile] = useState(false);

      useEffect(() => { localStorage.setItem("blocks_rp_mode", mode); }, [mode]);
      useEffect(() => { localStorage.setItem("blocks_rp_scheme", scheme); }, [scheme]);

      useEffect(() => {
        document.documentElement.setAttribute("data-mantine-color-scheme", scheme);
      }, [scheme]);

      // Tweak protocol
      useEffect(() => {
        const onMsg = (e) => {
          if (e?.data?.type === "__activate_edit_mode") setEditMode(true);
          if (e?.data?.type === "__deactivate_edit_mode") setEditMode(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const setKey = (k, v) => {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      };

      const realWidth = useRealViewportWidth();
      const bp = resolveBreakpoint(mode, realWidth);

      const widthLabel = useMemo(() => {
        if (mode === "real") return `${realWidth}px (real viewport)`;
        if (bp === "mobile")  return "390px (forced mobile)";
        if (bp === "tablet")  return "820px (forced tablet)";
        return "1440px (forced desktop)";
      }, [mode, realWidth, bp]);

      const Layout = bp === "mobile" ? MobileLayout : bp === "tablet" ? TabletLayout : DesktopLayout;

      // CompileModal for desktop/tablet; MobileCompileSheet for mobile — mobile's own in-page button handles it internally,
      // so the Tweak quick-action only needs to fire at the desktop/tablet breakpoints.
      const openCompile = () => setShowCompile(true);

      return (
        <div className="rp-root" data-mode={mode} data-screen-label={`bp-${bp}`}>
          {/* Breakpoint switcher — always visible */}
          <div className="bp-switcher">
            <span className="bp-label">Breakpoint</span>
            {[
              { k: "real",    l: "Real" },
              { k: "mobile",  l: "Mobile" },
              { k: "tablet",  l: "Tablet" },
              { k: "desktop", l: "Desktop" },
            ].map((o, i) => (
              <React.Fragment key={o.k}>
                {i === 1 && <div className="bp-sep"/>}
                <button className={mode === o.k ? "is-active" : ""} onClick={() => { setMode(o.k); setKey("mode", o.k); }}>
                  {o.l}
                </button>
              </React.Fragment>
            ))}
          </div>

          <div className="rp-stage">
            {mode !== "real" && (
              <div className="rp-meta">
                <span>Previewing</span>
                <strong>{bp.toUpperCase()}</strong>
                <span>·</span>
                <strong>{widthLabel}</strong>
              </div>
            )}
            <div className="rp-frame" data-bp={bp}>
              <div className="rp-inner">
                <Layout onCompile={openCompile} />
              </div>
            </div>
          </div>

          {/* Tweaks panel */}
          {editMode && (
            <div className="tweaks-panel">
              <div className="tweaks-panel__header">
                <span className="tweaks-panel__title">Tweaks</span>
                <span className="text-xs text-dimmed">Live</span>
              </div>
              <div className="tweaks-panel__body">
                <div className="tweak-row">
                  <div className="tweak-row__label">Breakpoint preview</div>
                  <div className="tweak-row__control">
                    {["real", "mobile", "tablet", "desktop"].map(m => (
                      <button key={m} className={mode === m ? "is-active" : ""} onClick={() => { setMode(m); setKey("mode", m); }} style={{ textTransform: "capitalize" }}>{m}</button>
                    ))}
                  </div>
                </div>
                <div className="tweak-row">
                  <div className="tweak-row__label">Color scheme</div>
                  <div className="tweak-row__control">
                    {["light", "dark"].map(s => (
                      <button key={s} className={scheme === s ? "is-active" : ""} onClick={() => { setScheme(s); setKey("scheme", s); }} style={{ textTransform: "capitalize" }}>{s}</button>
                    ))}
                  </div>
                </div>
                <div className="tweak-row">
                  <div className="tweak-row__label">Quick action</div>
                  <div className="tweak-row__control">
                    <button onClick={openCompile}>Open Compile preview</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showCompile && (
            bp === "mobile"
              ? <MobileCompileSheet blocks={BLOCKS} budget={TOKEN_BUDGET} onClose={() => setShowCompile(false)} />
              : <CompileModal blocks={BLOCKS} budget={TOKEN_BUDGET} onClose={() => setShowCompile(false)} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
