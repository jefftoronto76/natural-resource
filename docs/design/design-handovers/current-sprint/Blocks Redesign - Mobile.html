<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Sage.AI — Blocks Mobile</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="mantine.css"/>
  <link rel="stylesheet" href="mobile.css"/>
  <style>
    body { background: var(--mantine-color-gray-1); }
    .canvas-header {
      padding: 28px 28px 0;
      max-width: 1400px;
      margin: 0 auto;
    }
    .canvas-header h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
    .canvas-header p { color: var(--text-dimmed); font-size: 14px; margin: 0; max-width: 760px; }
    .canvas-row {
      display: flex;
      gap: 28px;
      padding: 24px 28px;
      overflow-x: auto;
      align-items: flex-start;
    }
    .phone-note {
      max-width: 390px;
      font-size: 12px;
      color: var(--text-dimmed);
      line-height: 1.5;
      text-align: center;
      margin-top: 6px;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>
  <script type="text/babel" src="mobile-compile.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Phone({ label, note, children }) {
      return (
        <div className="phone-col">
          <div className="phone-frame">
            <div className="phone-frame__screen">
              <div className="phone-frame__notch"/>
              <div className="phone-frame__status">
                <span>9:41</span>
                <span style={{display:"inline-flex", gap:4, alignItems:"center"}}>
                  <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect x="1" y="6" width="2" height="3" rx="0.5"/><rect x="5" y="4" width="2" height="5" rx="0.5"/><rect x="9" y="2" width="2" height="7" rx="0.5"/><rect x="13" y="0" width="2" height="9" rx="0.5"/></svg>
                  <svg width="24" height="11" viewBox="0 0 24 11" fill="none" stroke="currentColor" strokeWidth="1"><rect x="0.5" y="0.5" width="20" height="10" rx="2"/><rect x="2" y="2" width="17" height="7" rx="1" fill="currentColor"/><rect x="21" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
                </span>
              </div>
              <div className="phone-frame__body">
                {children}
              </div>
            </div>
          </div>
          <div className="phone-label">{label}</div>
          {note && <div className="phone-note">{note}</div>}
        </div>
      );
    }

    function SceneDefault() {
      return <MobileBlocks onCompile={() => {}} />;
    }

    // Scene: multi-select active from start
    function SceneSelect() {
      const inst = React.useRef();
      return (
        <div className="mobile-shell">
          <ScenedMobile initialSelect={true} />
        </div>
      );
    }

    // Wrapper that pre-sets scene state
    function ScenedMobile({ initialSelect, initialReorder, initialDetailIdx, initialCompile, initialMeterExpanded, initialDrawer, initialSearch }) {
      const [mounted, setMounted] = useState(false);
      useEffect(() => { setMounted(true); }, []);
      // Use a key'd MobileBlocks but pass props via a small controlled shim
      return <MobileBlocksScene
        initialSelect={initialSelect}
        initialReorder={initialReorder}
        initialDetailIdx={initialDetailIdx}
        initialCompile={initialCompile}
        initialMeterExpanded={initialMeterExpanded}
        initialDrawer={initialDrawer}
        initialSearch={initialSearch}
      />;
    }

    // A duplicate lightweight MobileBlocks that accepts initial-state props, so we can showcase different scenes in each phone frame.
    function MobileBlocksScene({ initialSelect, initialReorder, initialDetailIdx, initialCompile, initialMeterExpanded, initialDrawer, initialSearch }) {
      const [blocks, setBlocks] = useState(() => BLOCKS.map((b,i)=> i < 3 ? { ...b, active: i!==1 } : b));
      const [query, setQuery] = useState("");
      const [searchOpen, setSearchOpen] = useState(!!initialSearch);
      const [typeFilter, setTypeFilter] = useState("all");
      const [drawerOpen, setDrawerOpen] = useState(!!initialDrawer);
      const [meterExpanded, setMeterExpanded] = useState(!!initialMeterExpanded);
      const [selectMode, setSelectMode] = useState(!!initialSelect);
      const [selected, setSelected] = useState(() => initialSelect ? new Set([BLOCKS[0].id, BLOCKS[2].id, BLOCKS[5].id]) : new Set());
      const [reorderMode, setReorderMode] = useState(!!initialReorder);
      const [detailId, setDetailId] = useState(initialDetailIdx != null ? BLOCKS[initialDetailIdx].id : null);
      const [compile, setCompile] = useState(!!initialCompile);
      const [menuOpen, setMenuOpen] = useState(false);

      const filtered = React.useMemo(() => blocks
        .filter(b => !query || b.title.toLowerCase().includes(query.toLowerCase()))
        .filter(b => typeFilter === "all" || b.type === typeFilter)
        .sort((a,b) => a.order - b.order), [blocks, query, typeFilter]);

      const toggleActive = (id) => setBlocks(blocks.map(b => b.id === id ? { ...b, active: !b.active } : b));
      const toggleSelect = (id) => { const s = new Set(selected); s.has(id) ? s.delete(id) : s.add(id); setSelected(s); };
      const bulkActive = (v) => setBlocks(blocks.map(b => selected.has(b.id) ? { ...b, active: v } : b));
      const exitSelect = () => { setSelectMode(false); setSelected(new Set()); };

      const active = blocks.filter(b => b.active);
      const used = active.reduce((s,b) => s+b.tokens, 0);
      const pct = Math.min(100, (used/TOKEN_BUDGET)*100);
      const warn = pct > 80;
      const current = detailId ? blocks.find(b => b.id === detailId) : null;

      return (
        <div className="mobile-shell">
          {selectMode ? (
            <header className="m-appbar m-appbar--select">
              <button className="m-iconbtn" onClick={exitSelect}><Icon name="x" size={20}/></button>
              <div className="m-appbar__title">{selected.size} selected</div>
              <div className="m-appbar__actions">
                <button className="m-iconbtn" onClick={() => bulkActive(true)}><Icon name="check" size={20}/></button>
                <button className="m-iconbtn" onClick={() => bulkActive(false)}><Icon name="x" size={20}/></button>
                <button className="m-iconbtn m-iconbtn--danger"><Icon name="trash" size={18}/></button>
              </div>
            </header>
          ) : reorderMode ? (
            <header className="m-appbar">
              <button className="m-iconbtn" onClick={() => setReorderMode(false)}><Icon name="x" size={20}/></button>
              <div className="m-appbar__title">Reorder blocks</div>
              <button className="btn btn--filled btn--sm" onClick={() => setReorderMode(false)}>Done</button>
            </header>
          ) : (
            <header className="m-appbar">
              <button className="m-iconbtn" onClick={() => setDrawerOpen(true)}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
              </button>
              <div className="m-appbar__title">Blocks</div>
              <div className="m-appbar__actions">
                <button className="m-iconbtn" onClick={() => setSearchOpen(!searchOpen)}><Icon name="search" size={18}/></button>
                <button className="btn btn--filled-green btn--sm m-appbar__publish" onClick={() => setCompile(true)}>
                  <Icon name="sparkles" size={14}/> Publish
                </button>
              </div>
            </header>
          )}

          {!selectMode && (
            <button className="m-meter" onClick={() => setMeterExpanded(!meterExpanded)}>
              <div className="m-meter__bar">
                <div className="m-meter__fill" style={{ width: pct+"%", background: warn ? "var(--mantine-color-yellow-6)" : "var(--mantine-color-blue-6)" }}/>
              </div>
              <div className="m-meter__row">
                <span>
                  <span className="text-mono fw-600" style={{ color: warn ? "var(--mantine-color-yellow-7)" : "var(--text)" }}>{used.toLocaleString()}</span>
                  <span className="text-dimmed"> / {TOKEN_BUDGET.toLocaleString()} tokens</span>
                </span>
                <span className="text-xs text-dimmed">{active.length}/{blocks.length} active <span style={{ display:"inline-block", transition:"transform 120ms", transform: meterExpanded ? "rotate(180deg)" : "none" }}>▾</span></span>
              </div>
              {meterExpanded && (
                <div className="m-meter__legend">
                  {["process","knowledge","identity"].map(t => {
                    const sum = active.filter(b => b.type === t).reduce((s,b)=>s+b.tokens,0);
                    const color = { process:"var(--mantine-color-orange-6)", knowledge:"var(--mantine-color-teal-6)", identity:"var(--mantine-color-violet-6)" }[t];
                    return (
                      <div key={t} className="m-meter__leg">
                        <span style={{ width:8, height:8, borderRadius:2, background:color, display:"inline-block" }}/>
                        <span style={{ textTransform:"capitalize" }}>{t}</span>
                        <span className="text-mono fw-500">{sum.toLocaleString()}</span>
                        <span className="text-dimmed">{((sum/TOKEN_BUDGET)*100).toFixed(0)}%</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </button>
          )}

          {searchOpen && !selectMode && (
            <div className="m-search">
              <Icon name="search" size={16}/>
              <input autoFocus className="m-search__input" placeholder="Search blocks…" value={query} onChange={e => setQuery(e.target.value)}/>
              <button className="m-iconbtn" onClick={() => { setQuery(""); setSearchOpen(false); }}><Icon name="x" size={16}/></button>
            </div>
          )}

          {!selectMode && !reorderMode && (
            <div className="m-chips">
              <div className="m-chips__scroll scroll-area">
                {[{v:"all",l:"All"},{v:"process",l:"Process"},{v:"knowledge",l:"Knowledge"},{v:"identity",l:"Identity"}].map(o => (
                  <button key={o.v} onClick={() => setTypeFilter(o.v)} className={"m-chip" + (typeFilter === o.v ? " is-active" : "")}>{o.l}</button>
                ))}
              </div>
              <div style={{ position:"relative" }}>
                <button className="m-chips__select" onClick={() => setMenuOpen(!menuOpen)}><Icon name="dots" size={14}/></button>
                {menuOpen && (
                  <>
                    <div style={{ position:"fixed", inset:0, zIndex:9 }} onClick={() => setMenuOpen(false)}/>
                    <div className="m-menu">
                      <button onClick={() => { setSelectMode(true); setMenuOpen(false); }}><Icon name="check" size={14}/> Select</button>
                      <button onClick={() => { setReorderMode(true); setMenuOpen(false); }}><Icon name="drag" size={14}/> Reorder</button>
                      <button onClick={() => setMenuOpen(false)}><Icon name="plus" size={14}/> New block</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          <div className="m-list scroll-area">
            {filtered.map((b,i) => (
              <article key={b.id} className={"m-card " + (!b.active ? "is-disabled " : "") + (reorderMode ? "m-card--reorder " : "") + (selected.has(b.id) ? "m-card--selected" : "")}
                onClick={(e) => {
                  if (reorderMode) return;
                  if (selectMode) { toggleSelect(b.id); return; }
                  if (e.target.closest(".m-card__switch") || e.target.closest(".m-card__check")) return;
                  setDetailId(b.id);
                }}>
                {selectMode && (
                  <div className="m-card__check" onClick={() => toggleSelect(b.id)}>
                    <span className={"checkbox" + (selected.has(b.id) ? " checkbox--checked" : "")}/>
                  </div>
                )}
                {reorderMode && <div className="m-card__grip"><Icon name="drag" size={20}/></div>}
                <div className="m-card__main">
                  <div className="m-card__header">
                    <span className={"badge " + TYPES[b.type].badge}>{TYPES[b.type].label}</span>
                    <span className="text-mono text-xs text-dimmed">#{String(i+1).padStart(2,"0")}</span>
                    {!b.active && !reorderMode && <span className="badge badge--light-gray">Off</span>}
                  </div>
                  <h3 className="m-card__title">{b.title}</h3>
                  {!reorderMode && (
                    <div className="m-card__meta">
                      <span className="text-mono">{b.tokens} tok</span>
                      <span>·</span>
                      <span>{b.updated}</span>
                      <span>·</span>
                      <span>{b.author}</span>
                    </div>
                  )}
                </div>
                {!selectMode && !reorderMode && (
                  <label className="m-card__switch" onClick={e => e.stopPropagation()}>
                    <input type="checkbox" checked={b.active} onChange={() => toggleActive(b.id)}/>
                    <span className="switch__track"><span className="switch__thumb"/></span>
                  </label>
                )}
              </article>
            ))}
            <div style={{ height: 80 }}/>
          </div>

          {!selectMode && !reorderMode && <button className="m-fab"><Icon name="plus" size={22}/></button>}

          {drawerOpen && (
            <>
              <div className="m-drawer__scrim" onClick={() => setDrawerOpen(false)}/>
              <aside className="m-drawer" role="dialog" aria-label="Navigation">
                <button
                  className="m-drawer__close"
                  onClick={() => setDrawerOpen(false)}
                  aria-label="Close navigation"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
                </button>
                <div className="nav-brand"><div className="nav-brand__name">Natural Resource</div><div className="nav-brand__role">Admin</div></div>
                <button className="nav-link">Inbound Chats</button>
                <button className="nav-link">Prompt</button>
                <button className="nav-link">Settings</button>
                <div className="nav-section-label">Prompt Studio</div>
                <button className="nav-link">Composer</button>
                <button className="nav-link nav-link--active">Blocks</button>
                <button className="nav-link">History</button>
                <button className="nav-link">Assets</button>
                <button className="nav-link">Prompt</button>
                <div className="nav-user"><div className="nav-user__avatar">JT</div><div><div className="nav-user__name">Jeff Torres</div><div className="nav-user__email">jeff@naturalresource.co</div></div></div>
              </aside>
            </>
          )}

          {current && (
            <>
              <div className="m-sheet__scrim" onClick={() => setDetailId(null)}/>
              <div className="m-sheet m-sheet--detail">
                <div className="m-sheet__grabber"/>
                <div className="m-sheet__header">
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                      <span className={"badge " + TYPES[current.type].badge}>{TYPES[current.type].label}</span>
                      <span className="text-xs text-dimmed">·</span>
                      <span className="text-xs text-dimmed">{current.tokens} tokens</span>
                    </div>
                    <div className="m-sheet__title">{current.title}</div>
                    <div className="text-xs text-dimmed" style={{ marginTop:4 }}>Updated {current.updated} by {current.author}</div>
                  </div>
                  <button className="m-iconbtn" onClick={() => setDetailId(null)}><Icon name="x" size={20}/></button>
                </div>
                <div className="m-sheet__body scroll-area">
                  <div className="text-xs fw-600 text-dimmed" style={{ textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Content</div>
                  <div style={{ fontFamily:"var(--mantine-font-family-monospace)", fontSize:13.5, lineHeight:1.7, color:"var(--text)", whiteSpace:"pre-wrap" }}>{current.preview}</div>
                </div>
                <div className="m-sheet__footer">
                  <label className="m-sheet__status">
                    <label className="switch">
                      <input type="checkbox" checked={current.active} onChange={() => toggleActive(current.id)}/>
                      <span className="switch__track"><span className="switch__thumb"/></span>
                    </label>
                    <span className="text-sm fw-500">{current.active ? "Active" : "Disabled"}</span>
                  </label>
                  <div style={{ display:"flex", gap:4, marginLeft:"auto" }}>
                    <button className="action-icon"><Icon name="copy"/></button>
                    <button className="action-icon action-icon--danger"><Icon name="trash"/></button>
                  </div>
                  <button className="btn btn--filled btn--sm" style={{ marginLeft:4 }}><Icon name="edit" size={12}/> Edit</button>
                </div>
              </div>
            </>
          )}

          {compile && <MobileCompileSheet blocks={blocks} budget={TOKEN_BUDGET} onClose={() => setCompile(false)}/>}
        </div>
      );
    }

    function App() {
      return (
        <div>
          <div className="canvas-header">
            <h1>Blocks — Mobile-first (≤ 640px)</h1>
            <p>Opinionated for review & toggle on the phone. Edit actions surface in the detail sheet; drag-to-reorder lives in an explicit mode to avoid fat-finger reorders. Desktop layout (Variation B split view) kicks in ≥ 1024px — see <strong>Blocks Redesign — Desktop (saved).html</strong>.</p>
          </div>

          <div className="canvas-row" data-screen-label="01 Home">
            <Phone label="01 · Home" note="Sticky token bar, filter chips, list cards with primary Switch. Tap card → detail sheet. Publish button pinned in the app bar.">
              <MobileBlocksScene/>
            </Phone>
            <Phone label="02 · Expanded meter" note="Tap the token strip to reveal per-type breakdown with % of budget.">
              <MobileBlocksScene initialMeterExpanded={true}/>
            </Phone>
            <Phone label="03 · Detail sheet" note="Tap a card to read the full block content. Toggle, duplicate, delete, or edit from the footer.">
              <MobileBlocksScene initialDetailIdx={5}/>
            </Phone>
          </div>

          <div className="canvas-row" data-screen-label="02 States">
            <Phone label="04 · Multi-select" note="Entered from the overflow menu. App bar morphs into a blue selection bar with bulk Enable / Disable / Delete.">
              <MobileBlocksScene initialSelect={true}/>
            </Phone>
            <Phone label="05 · Reorder mode" note="Dedicated mode. Cards collapse to compact form, switches hidden, big drag grips appear. Done button commits.">
              <MobileBlocksScene initialReorder={true}/>
            </Phone>
            <Phone label="06 · Publish preview" note="Full-screen sheet instead of a desktop modal. Token meter, diff summary, and compiled prompt preview.">
              <MobileBlocksScene initialCompile={true}/>
            </Phone>
          </div>

          <div className="canvas-row" data-screen-label="03 Navigation">
            <Phone label="07 · Drawer nav" note="Hamburger opens the same sidebar structure as desktop; Blocks highlighted.">
              <MobileBlocksScene initialDrawer={true}/>
            </Phone>
            <Phone label="08 · Search" note="Icon in app bar expands into an inline search strip. Filters via chips stay visible.">
              <MobileBlocksScene initialSearch={true}/>
            </Phone>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
